server:
  port: ${PORT:8080}
  # Tối ưu Tomcat cho Render (giới hạn thread tránh OOM)
  tomcat:
    threads:
      max: 50
      min-spare: 5
    connection-timeout: 20000

spring:
  application:
    name: SWD392
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # HikariCP connection pool — tối ưu cho Render free tier
    hikari:
      maximum-pool-size: 5          # Render free DB giới hạn connections
      minimum-idle: 2
      idle-timeout: 300000          # 5 phút
      connection-timeout: 20000     # 20 giây
      max-lifetime: 1200000         # 20 phút (dưới PostgreSQL timeout)
      keepalive-time: 60000         # Giữ connection sống
      pool-name: SWD392HikariPool

  jpa:
    show-sql: false
    open-in-view: false   # Tắt open-in-view để tránh lazy loading ngoài request scope
    hibernate:
      # Dùng update để tự động tạo schema lần đầu, validate sau khi stable
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Tắt open-in-view để tránh lazy loading vô ý
        enable_lazy_load_no_trans: false
        # Batch insert/update để tăng performance
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      # Upstash Redis yêu cầu password — để trống nếu dùng local
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  servlet:
    multipart:
      enabled: true
      # Giảm từ 100MB → 50MB để tránh OOM trên Render free (512MB RAM)
      max-file-size: 50MB
      max-request-size: 50MB

  # Mail config đã bỏ SMTP → dùng Brevo HTTP API (xem brevo: config bên dưới)
  # Render free tier block port SMTP 587/465 nên phải dùng REST API

# Brevo Transactional Email API (HTTP - không bị Render block)
brevo:
  api-key: ${BREVO_API_KEY}              # Lấy từ Brevo Dashboard → SMTP & API → API Keys
  sender-email: ${BREVO_SENDER_EMAIL}    # Email đã verify trên Brevo (Senders)
  sender-name: ${BREVO_SENDER_NAME:SWD392 Team}  # Tên hiển thị

# Swagger/OpenAPI chỉ bật khi có SWAGGER_ENABLED=true (mặc định tắt trên production)
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder: swd392-videos

assembly:
  api-key: ${ASSEMBLY_API_KEY}

gemini:
  api-key: ${GEMINI_API_KEY}

app:
  frontend-url: ${FRONTEND_URL}

momo:
  partnerCode: ${MOMO_PARTNER_CODE}
  accessKey: ${MOMO_ACCESS_KEY}
  secretKey: ${MOMO_SECRET_KEY}
  endpoint: ${MOMO_ENDPOINT}
  redirectUrl: ${MOMO_REDIRECT_URL}
  ipnUrl: ${MOMO_IPN_URL}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  payment-url: ${VNPAY_PAYMENT_URL}
  return-url: ${VNPAY_RETURN_URL}

logging:
  level:
    root: WARN
    com.minhkhoi.swd392: INFO
    # ===== DEBUG TẠM THỜI ĐỂ TÌM LỖI 403 =====
    org.springframework.security: DEBUG          # Log toàn bộ Security chain
    org.springframework.web.cors: DEBUG          # Log CORS decisions
    org.springframework.security.web.access: DEBUG  # Log Access Denied (403)
    # ==========================================
    org:
      springframework:
        data:
          repository:
            config: ERROR
        web: WARN
      hibernate:
        SQL: ERROR
        type:
          descriptor:
            sql:
              BasicBinder: ERROR
