<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMO Payment Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #a50064 0%, #d53d8e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(165, 0, 100, 0.3);
        }

        .selected-plan {
            border-color: #a50064;
            background: rgba(165, 0, 100, 0.05);
        }
    </style>
</head>

<body
    class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat bg-blend-overlay bg-fixed">
    <div class="absolute inset-0 bg-gray-900/90"></div>

    <div class="relative w-full max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4">MOMO <span class="gradient-text">Payment Sandbox</span></h1>
            <p class="text-gray-400 text-lg">Test your integration with premium subscriptions</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Quick Login -->
            <div
                class="lg:col-span-3 glass rounded-2xl p-6 mb-4 flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="loginEmail" placeholder="Email" value="instructor@gmail.com"
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-[#a50064] transition-colors text-sm">
                    <input type="password" id="loginPassword" placeholder="Password" value="Instructor@123"
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-[#a50064] transition-colors text-sm">
                </div>
                <button onclick="login()" id="loginBtn"
                    class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-8 rounded-xl transition-colors whitespace-nowrap">
                    Login & Autofill
                </button>
            </div>

            <!-- Auth Config -->
            <div class="lg:col-span-3 glass rounded-2xl p-6 mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">Authentication Token (Bearer)</label>
                <input type="text" id="authToken" placeholder="Paste your JWT token here..."
                    class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-[#a50064] transition-colors text-sm font-mono">
            </div>

            <!-- Payment Provider -->
            <div class="lg:col-span-3 glass rounded-2xl p-6 mb-4">
                <h3 class="text-lg font-bold mb-4 text-gray-300">Select Payment Method</h3>
                <div class="flex flex-col md:flex-row gap-4">
                    <div onclick="selectProvider('MOMO')" id="provider-MOMO"
                        class="provider-card flex-1 glass p-4 rounded-xl cursor-pointer text-center border-2 border-[#a50064] bg-[#a50064]/10 transition-all">
                        <span class="font-bold text-[#a50064]">MOMO Wallet</span>
                    </div>
                    <div onclick="selectProvider('VNPAY')" id="provider-VNPAY"
                        class="provider-card flex-1 glass p-4 rounded-xl cursor-pointer text-center border-2 border-transparent hover:bg-gray-800/50 transition-all">
                        <span class="font-bold text-blue-500">VNPAY Sandbox</span>
                    </div>
                </div>
            </div>

            <!-- Plans -->
            <div onclick="selectPlan('BASIC', 100000)" id="plan-BASIC"
                class="plan-card glass rounded-2xl p-6 cursor-pointer transition-all duration-300 card-hover border-2 border-transparent">
                <!-- ... content ... -->
                <div class="h-12 w-12 rounded-full bg-blue-500/10 flex items-center justify-center mb-4">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold mb-2">Basic Plan</h3>
                <!-- ... -->
            </div>
            <!-- ... -->
        </div>

        <!-- Checkout Action -->
        <div class="mt-8 text-center">
            <button onclick="initiatePayment()" id="payBtn"
                class="bg-gradient-to-r from-[#a50064] to-[#d53d8e] hover:shadow-lg text-white font-bold py-4 px-12 rounded-full transition-all duration-300 transform hover:scale-105 shadow-xl disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center mx-auto min-w-[200px]">
                <span id="btnText">Pay Now</span>
                <svg id="loadingSpinner" class="animate-spin ml-3 h-5 w-5 text-white hidden"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>
            <p id="statusMsg" class="mt-4 text-gray-400"></p>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification"
        class="fixed bottom-4 right-4 bg-gray-800 border border-gray-700 p-4 rounded-xl shadow-2xl transform translate-y-20 transition-transform duration-300 hidden z-50">
        <p id="notifText" class="text-sm font-medium"></p>
    </div>

    <script>
        let selectedPlan = null;
        let selectedAmount = 0;
        let selectedProvider = 'MOMO';

        function selectProvider(provider) {
            selectedProvider = provider;

            // UI Update
            document.querySelectorAll('.provider-card').forEach(el => {
                el.classList.remove('border-[#a50064]', 'bg-[#a50064]/10');
                el.classList.add('border-transparent');
            });

            const card = document.getElementById(`provider-${provider}`);
            card.classList.remove('border-transparent');
            card.classList.add('border-[#a50064]', 'bg-[#a50064]/10');
        }

        async function login() {
            // ... (keep existing login logic) ...
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = 'Logging in...';
            btn.disabled = true;

            try {
                const response = await axios.post('/api/auth/login', {
                    email: email,
                    password: password
                });

                if (response.data.success) {
                    const token = response.data.data.accessToken;
                    document.getElementById('authToken').value = token;
                    showNotification('Login successful! Token autofilled.', 'success');
                } else {
                    showNotification('Login failed: ' + response.data.message, 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Login error: ' + (error.response?.data?.message || error.message), 'error');
            } finally {
                btn.innerText = 'Login & Autofill';
                btn.disabled = false;
            }
        }

        function selectPlan(plan, amount) {
            // ... (keep existing selectPlan logic) ...
            document.querySelectorAll('.plan-card').forEach(el => {
                el.classList.remove('selected-plan', 'ring-2', 'ring-[#a50064]');
            });

            // Select
            selectedPlan = plan;
            selectedAmount = amount;

            const card = document.getElementById(`plan-${plan}`);
            card.classList.add('selected-plan', 'ring-2', 'ring-[#a50064]');
        }

        async function initiatePayment() {
            const token = document.getElementById('authToken').value.trim();
            const btn = document.getElementById('payBtn');
            const spinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            const statusMsg = document.getElementById('statusMsg');

            if (!token) {
                showNotification('Please enter your authentication token!', 'error');
                return;
            }
            if (!selectedPlan) {
                showNotification('Please select a subscription plan!', 'error');
                return;
            }

            // Loading state
            btn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.innerText = 'Processing...';
            statusMsg.innerText = '';

            try {
                let endpoint = '/identity/payment/create'; // default MOMO
                if (selectedProvider === 'VNPAY') {
                    endpoint = '/identity/payment/vnpay/create';
                }

                const response = await axios.post(endpoint, {
                    subscriptionPlan: selectedPlan,
                    amount: selectedAmount,
                    orderInfo: `Subscription - ${selectedPlan} Plan`
                }, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.data && response.data.paymentUrl) {
                    showNotification(`Payment created with ${selectedProvider}! Redirecting...`, 'success');
                    setTimeout(() => {
                        window.location.href = response.data.paymentUrl;
                    }, 1000);
                } else {
                    throw new Error('No payment URL returned');
                }

            } catch (error) {
                console.error(error);
                const msg = error.response?.data?.message || error.message || 'Payment creation failed';
                showNotification(msg, 'error');
                statusMsg.innerText = msg;
                statusMsg.className = 'mt-4 text-red-500 font-medium';
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                btnText.innerText = 'Pay Now';
            }
        }

        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            const text = document.getElementById('notifText');

            notif.classList.remove('hidden', 'translate-y-20');
            text.innerText = msg;

            if (type === 'error') {
                text.className = 'text-red-400';
                notif.className = 'fixed bottom-4 right-4 bg-gray-800 border border-red-900/50 p-4 rounded-xl shadow-2xl transform transition-transform duration-300';
            } else {
                text.className = 'text-green-400';
                notif.className = 'fixed bottom-4 right-4 bg-gray-800 border border-green-900/50 p-4 rounded-xl shadow-2xl transform transition-transform duration-300';
            }

            setTimeout(() => {
                notif.classList.add('translate-y-20');
                setTimeout(() => notif.classList.add('hidden'), 300);
            }, 3000);
        }
    </script>
</body>

</html>
